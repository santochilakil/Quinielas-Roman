<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista Preliminar</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("A71A3DF2-DE11-4C4E-9A40-F84BF17D8ED2.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.contenedor{
width:98%;
margin:20px auto;
background:rgba(255,255,255,.95);
border-radius:15px;
overflow:hidden;
}

header{
text-align:center;
padding:20px;
}

.logo{
width:130px;
}

h1{
margin:5px;
color:#222;
}

h2{
background:#4B0082;
color:white;
padding:10px;
border-radius:8px;
display:inline-block;
}

#buscar{
width:90%;
padding:12px;
font-size:18px;
margin:15px;
border-radius:8px;
border:1px solid #ccc;
}

.tabla{
display:flex;
}

.izquierda{
width:230px;
border-right:2px solid #ddd;
background:#fafafa;
}

.derecha{
flex:1;
overflow-x:auto;
}

</style>

</head>

<body>

<div class="contenedor">

<header>

<img src="Logo.png" class="logo">

<h1>QUINIELAS CANCÚN</h1>

<h2>LISTA PRELIMINAR</h2>

<br><br>

<input
type="text"
id="buscar"
placeholder="🔍 Buscar participante">

</header>

<div class="tabla">

<div class="izquierda">

</div>

<div class="derecha">

<table id="tabla">

<thead>

<tr>

<th class="partido">América<br>vs<br>Chivas</th>

<th class="partido">Tigres<br>vs<br>Atlas</th>

<th class="partido">Toluca<br>vs<br>Cruz Azul</th>

<th class="partido">Pumas<br>vs<br>León</th>

<th class="partido">Monterrey<br>vs<br>Pachuca</th>

<th class="partido">Santos<br>vs<br>Necaxa</th>

<th class="partido">Querétaro<br>vs<br>Juárez</th>

<th class="partido">Mazatlán<br>vs<br>Puebla</th>

<th class="partido">Tijuana<br>vs<br>Atlético San Luis</th>

<th class="partido">Suplente</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

</div>

</div>

</body>

</html>
