<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista 4 - Quinielas Cancún</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
min-height:100vh;
background:linear-gradient(180deg,#0b3f8f 0%,#2b6fd1 45%,#0b3f8f 100%);
display:flex;
justify-content:flex-start;
align-items:center;
flex-direction:column;
padding:20px 15px;
}
 .logo{
width:120px;
height:auto;
display:block;
margin:0 auto 8px;
} 
 h1{
margin:8px 0;
font-size:44px;
font-weight:900;
text-align:center;
letter-spacing:2px;
background:linear-gradient(
to bottom,
#ffffff 0%,
#fdfdfd 18%,
#d9d9d9 45%,
#ffffff 70%,
#bfbfbf 100%
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:
0 1px 1px rgba(255,255,255,.8),
0 2px 4px rgba(0,0,0,.35);
}
input{
width:95%;
max-width:520px;
height:58px;
padding:0 22px;
font-size:22px;
font-weight:bold;
color:#003366;
background:linear-gradient(
to bottom,
#eefcff 0%,
#b9efff 18%,
#82dcff 40%,
#47c4ff 65%,
#a9ecff 100%
);
border:2px solid #d9f8ff;
border-radius:35px;
outline:none;
box-shadow:
0 4px 10px rgba(0,0,0,.25),
inset 0 2px 4px rgba(255,255,255,.9);
transition:.30s;
}

input::placeholder{
color:#1b4d7a;
font-weight:bold;
}

input:focus{
transform:scale(1.03);
border-color:#ffffff;
box-shadow:
0 0 15px #8fe9ff,
0 0 30px #5fd8ff,
0 0 45px rgba(120,220,255,.7),
inset 0 2px 5px rgba(255,255,255,.95);
} 
</style>

</head>

<body>
<img src="Logo.png" class="logo">

<h1>LISTA PRELIMINAR</h1>

<input
type="text"
placeholder="🔍 Buscar participante..."
>
 <div class="tabla-contenedor">

<table class="tabla-lista">

<thead>

<tr class="fila-p">

<th class="participante" rowspan="2">Participante</th>

<th>P1</th>
<th>P2</th>
<th>P3</th>
<th>P4</th>
<th>P5</th>
<th>P6</th>
<th>P7</th>
<th>P8</th>
<th>P9</th>
<th class="ps">PS</th>

</tr>

<tr class="fila-partidos">

<th>Atlante vs América</th>
<th>Tijuana vs León</th>
<th>Chivas vs FC Juárez</th>
<th>Tigres vs Atlético SL</th>
<th>Santos vs Atlas</th>
<th>Necaxa vs Monterrey</th>
<th>Pachuca vs Querétaro</th>
<th>Toluca vs Cruz Azul</th>
<th>Sporting KC vs Los Ángeles</th>
<th class="ps">Chicago Fire vs New YorkC</th>

</tr>

</thead>

<tbody id="listaParticipantes">

</tbody>

</table>

</div>
</body>

</html>
