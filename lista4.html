<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista 4 - Quinielas Cancún</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
min-height:100vh;
background:linear-gradient(180deg,#0b3f8f 0%,#2b6fd1 45%,#0b3f8f 100%);
display:flex;
justify-content:flex-start;
align-items:center;
flex-direction:column;
padding:20px 5px;
}
 .logo{
width:120px;
height:auto;
display:block;
margin:0 auto 8px;
} 
 h1{
margin:12px 0 18px;
font-size:50px;
font-weight:900;
line-height:0.95;
text-align:center;
letter-spacing:1px;
background:linear-gradient(
to bottom,
#ffffff 0%,
#fdfdfd 18%,
#d9d9d9 45%,
#ffffff 70%,
#bfbfbf 100%
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:
0 1px 1px rgba(255,255,255,.8),
0 2px 4px rgba(0,0,0,.35);
}
input{
width:95%;
max-width:520px;
height:58px;
padding:0 22px;
font-size:22px;
font-weight:bold;
color:#003366;
background:linear-gradient(
to bottom,
#eefcff 0%,
#b9efff 18%,
#82dcff 40%,
#47c4ff 65%,
#a9ecff 100%
);
border:2px solid #d9f8ff;
border-radius:35px;
outline:none;
box-shadow:
0 4px 10px rgba(0,0,0,.25),
inset 0 2px 4px rgba(255,255,255,.9);
transition:.30s;
}

input::placeholder{
color:#1b4d7a;
font-weight:bold;
}

input:focus{
transform:scale(1.03);
border-color:#ffffff;
box-shadow:
0 0 15px #8fe9ff,
0 0 30px #5fd8ff,
0 0 45px rgba(120,220,255,.7),
inset 0 2px 5px rgba(255,255,255,.95);
} 
.tabla-contenedor{
width:100vw;
margin-left:calc(50% - 50vw);
margin-top:25px;
overflow:hidden;
}

.tabla{
border-collapse:collapse;
margin:auto;
width:auto;
table-layout:fixed;
background:#fff;
}
.tabla th,
.tabla td{
border:2px solid #2a2a2a;
text-align:center;
padding:0;
}

.participante{
width:60px;
min-width:60px;
background:linear-gradient(to bottom,#72b8ff,#2d72d9,#5aa6ff);
color:#fff;
font-size:11px;
font-weight:bold;
text-shadow:1px 1px 2px #000;
}

.p{
width:26px;
height:24px;
background:linear-gradient(to bottom,#fff6a0,#ffd84c,#ffc800,#ffe98b);
color:#000;
font-size:10px;
font-weight:bold;
}
.ps{
width:26px;
height:24px;
background:linear-gradient(to bottom,#ffd19a,#ff9f1c,#ff7b00,#ffc07a);
color:#000;
font-size:10px;
font-weight:bold;
}

.partido{
width:26px;
height:90px;
background:linear-gradient(to bottom,#fff6a0,#ffd84c,#ffc800,#ffe98b);
color:#000;
writing-mode:vertical-rl;
transform:rotate(180deg);
font-size:7px;
font-weight:bold;
padding:4px 2px;
}

.partido-ps{
width:26px;
height:90px;
background:linear-gradient(to bottom,#ffd19a,#ff9f1c,#ff7b00,#ffc07a);
color:#000;
writing-mode:vertical-rl;
transform:rotate(180deg);
font-size:7px;
font-weight:bold;
padding:4px 2px;
}

#listaParticipantes td{
height:52px;
font-size:24px;
font-weight:bold;
background:#fff;
color:#000;
}

#listaParticipantes td:first-child{
background:#000;
color:#fff;
text-align:left;
padding-left:6px;
width:60px;
min-width:60px;
font-size:13px;
font-weight:bold;
line-height:1.1;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}
thead{
position:sticky;
top:0;
z-index:100;
}
 /* Todo tu CSS anterior */

#listaParticipantes .fila-resultados td{
    width:26px;
    min-width:26px;
    height:24px;
    background:linear-gradient(to bottom,#fff6a0,#ffd84c,#ffc800,#ffe98b);
    color:#000;
    text-align:center;
    font-weight:bold;
    border:2px solid #2a2a2a;
    padding:0;
}

.resultado-nombre{
    width:60px;
    min-width:60px;
    background:linear-gradient(to bottom,#fff6a0,#ffd84c,#ffc800,#ffe98b)!important;
    color:#000!important;
    font-size:10px;
    font-weight:bold;
}

.fila-resultados td[contenteditable]{
    width:24px;
    min-width:24px;
    height:8px;
    background:linear-gradient(to bottom,#fff6a0,#ffd84c,#ffc800,#ffe98b);
    color:#000;
    text-align:center;
    vertical-align:middle;
    font-size:14px;
    font-weight:bold;
    text-transform:uppercase;
    padding:0;
    border:2px solid #2a2a2a;
}
 .aciertos{
    width:26px;
    min-width:26px;
    height:57px;
    background:linear-gradient(to bottom,#32c94b,#169b2d,#0f7f24);
    color:#fff;
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    font-size:10px;
    font-weight:bold;
    text-align:center;
    vertical-align:middle;
    border:2px solid #2a2a2a;
}
</style>


</head>

<body>
<img src="Logo.png" class="logo">

<h1>LISTA PRELIMINAR</h1>

<input
type="text"
placeholder="🔍 Buscar participante..."
>
<div class="tabla-contenedor">

<table class="tabla">

<thead>

<tr>

<th class="participante" rowspan="2">Participante</th>

<th class="p">P1</th>
<th class="p">P2</th>
<th class="p">P3</th>
<th class="p">P4</th>
<th class="p">P5</th>
<th class="p">P6</th>
<th class="p">P7</th>
<th class="p">P8</th>
<th class="p">P9</th>

<th class="ps">PS</th>


</tr>

<tr>

<th class="partido">Atlante vs América</th>
<th class="partido">Tijuana vs León</th>
<th class="partido">Chivas vs FC Juárez</th>
<th class="partido">Tigres vs Atlético SL</th>
<th class="partido">Santos vs Atlas</th>
<th class="partido">Necaxa vs Monterrey</th>
<th class="partido">Pachuca vs Querétaro</th>
<th class="partido">Toluca vs Cruz Azul</th>
<th class="partido">Sporting KC vs Los Ángeles</th>

<th class="partido-ps">Chicago Fire vs New YC</th>
<th class="aciertos" rowspan="2">ACIERTOS</th>
</tr>
</thead>

<tbody id="listaParticipantes">

<tr class="fila-resultados">

<td class="resultado-nombre">RESULTADOS</td>

<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>

</tr>

</tbody>

</table>

</div>
</body>

</html>
