<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista Preliminar</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#003366;
margin-bottom:5px;
}

p{
text-align:center;
color:#666;
}

#buscar{
width:100%;
padding:12px;
font-size:18px;
margin:20px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

.participante{

background:white;
border-radius:10px;
margin-bottom:10px;
padding:15px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,.15);

}

.nombre{

font-size:20px;
font-weight:bold;

}

.detalle{

display:none;
margin-top:15px;
border-top:1px solid #ddd;
padding-top:15px;

}

.quiniela{

background:#fafafa;
padding:10px;
margin-bottom:10px;
border-radius:8px;

}

</style>

</head>

<body>

<h1>📋 Lista Preliminar</h1>

<p>
Revisa tus quinielas antes del cierre de la jornada.
</p>

<input
type="text"
id="buscar"
placeholder="🔍 Buscar participante...">

<div id="lista"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyB1gDhB37nA5F-zk6-M0hAvZJTGvW6SOBQ",
authDomain:"quinielas-cancun.firebaseapp.com",
projectId:"quinielas-cancun",
storageBucket:"quinielas-cancun.firebasestorage.app",
messagingSenderId:"419348494986",
appId:"1:419348494986:web:b73e42c52c3f41e19b8b73"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");

const q = query(collection(db,"quinielas"),orderBy("nombre"));

const snapshot = await getDocs(q);

snapshot.forEach(doc=>{

const d = doc.data();

lista.innerHTML += `
<div class="participante">

<div class="nombre">
▶ ${d.nombre}
</div>

<div class="detalle">

${d.quinielas.length} quiniela(s)

</div>

</div>
`;

});

</script>

</body>
</html>
