<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quinielas Cancún</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0047AB,#00B894);
text-align:center;
color:white;
}

.contenedor{
width:90%;
max-width:650px;
padding:45px;
border-radius:25px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);
box-shadow:0 15px 40px rgba(0,0,0,.35);
}

h1{
font-size:58px;
font-weight:900;
color:#FFD700;
text-shadow:4px 4px 10px rgba(0,0,0,.5);
margin-bottom:20px;
}

p{
font-size:24px;
line-height:1.6;
margin-bottom:40px;
}

.boton{
display:inline-block;
padding:18px 45px;
background:#FFD700;
color:#000;
text-decoration:none;
font-size:24px;
font-weight:bold;
border-radius:60px;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.boton:hover{
transform:scale(1.08);
background:#FFC107;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>⚽ QUINIELAS CANCÚN ⚽</h1>

<p>
Demuestra cuánto sabes de fútbol.<br>
Pronostica los resultados y compite por el primer lugar.
</p>

<a href="#" class="boton">COMENZAR QUINIELA</a>

</div>

</body>
</html>
