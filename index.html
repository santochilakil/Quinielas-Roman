<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quinielas Cancún</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("A71A3DF2-DE11-4C4E-9A40-F84BF17D8ED2.png") center center/cover no-repeat;
text-align:center;
color:white;
}

.contenedor{
width:90%;
max-width:650px;
padding:45px;
border-radius:25px;
background:transparent;
backdrop-filter:none;
box-shadow:none;
}

h1{
font-size:60px;
font-weight:900;
color:#FFD700;
text-shadow:4px 4px 10px rgba(0,0,0,.5);
margin-bottom:20px;
text-align:center;
line-height:1.05;
}

p{
font-size:24px;
line-height:1.5;
margin-bottom:35px;
font-weight:500;
text-shadow:2px 2px 8px rgba(0,0,0,.6);
}

.boton{
display:inline-block;
padding:18px 45px;
background:#FFD700;
color:#000;
text-decoration:none;
font-size:24px;
font-weight:bold;
border-radius:60px;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.boton:hover{
transform:scale(1.08);
background:#FFC107;
}

 .logo{
display:block;
width:80%;
max-width:350px;
height:auto;
margin:0 auto 20px;
} 
 h3{
margin-top:25px;
font-size:26px;
color:#FFD700;
text-shadow:2px 2px 6px rgba(0,0,0,.5);
}
</style>

</head>

<body>

<div class="contenedor">

<img src="Logo.png" class="logo" alt="Quinielas Cancún">

<p>

DEMUESTRA CUANTO SABES DE FÚTBOL.<br><br>
PRONOSTICA LOS RESULTADOS Y PARTICIPA POR EL PREMIO
</p>


<a href="Formulario.html" class="boton">CREAR QUINIELA</a>
<h3 id="jornadaTitulo">Cargando...</h3>
</div>
<script>
fetch("datos/jornada.json")
.then(r => r.json())
.then(datos => {
    document.getElementById("jornadaTitulo").innerHTML =
        "JORNADA " + datos.jornada;
});
</script>
</body>
</html>
