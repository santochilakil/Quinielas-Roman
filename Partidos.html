<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QUINIELAS CANCUN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:url("A71A3DF2-DE11-4C4E-9A40-F84BF17D8ED2.png") no-repeat center center fixed;
background-size:cover;
padding:20px;
padding-bottom:140px;
}

h1{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    color:white;
    font-size:30px;
    font-weight:900;
    margin-bottom:15px;
    text-shadow:2px 2px 6px rgba(0,0,0,.8);
    white-space:nowrap;
}
.resumen{
position:sticky;
top:0;
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
margin-bottom:15px;
z-index:100;
max-width:620px;
margin-left:auto;
margin-right:auto;
}

.tarjetas{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}


.tarjeta{
background:#FFD700;
color:#000;
padding:8px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.20);
}
 .tarjeta h3{
font-size:12px;
margin-bottom:2px;
color:#000;
}
.tarjeta span{
font-size:18px;
font-weight:bold;
color:#000;
}

.listaPartidos{
display:flex;
flex-direction:column;
gap:15px;
}


.partido{
background:white;
padding:4px 15px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.10);
}
.numero{
font-size:13px;
font-weight:bold;
color:#666;
text-align:center;
margin-bottom:2px;
}

.fila{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
gap:18px;
}

.local{
text-align:right;
font-weight:bold;
}

.visitante{
text-align:left;
font-weight:bold;
}

.botones{
display:flex;
gap:8px;
}

.opcion{
width:42px;
height:42px;
border-radius:50%;
background:#dfe6e9;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
cursor:pointer;
transition:.2s;
user-select:none;
}

.opcion.activa{
background:#00b894;
color:white;
}

#listaQuinielas{
margin-top:25px;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.10);
}

#listaQuinielas h2{
margin-bottom:10px;
color:#003366;
}

#quinielasGuardadas{
display:flex;
flex-direction:column;
gap:8px;
}

.item{
padding:10px;
background:#f4f7fb;
border-radius:8px;
font-size:14px;
}

.acciones{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:15px;
display:flex;
gap:10px;
box-shadow:0 -4px 12px rgba(0,0,0,.20);
}

button{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
#agregar{
background:#007BFF;
color:white;
}

#enviar{
background:#25D366;
color:white;
}

.filaNueva{
display:grid;
grid-template-columns:35% 30% 35%;
align-items:center;
}

.equipo{
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
height:90px;
padding:5px 0;
}
.escudo{
max-width:65px;
max-height:65px;
object-fit:contain;
}

.nombreEquipo{
font-weight:bold;
color:black;
font-size:15px;
text-align:center;
}
.centro{
display:flex;
justify-content:center;
align-items:center;
height:90px;
background:white;
border-radius:10px;
}
.local,
.visitante{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:16px;
gap:2px;
}

.local{
justify-content:flex-end;
}

.visitante{
justify-content:flex-start;
}

.escudoMini{
width:50px;
height:50px;
object-fit:contain;
margin:0 4px;
}
 .logoTitulo{
width:45px;
height:45px;
object-fit:contain;
vertical-align:middle;
margin:0 10px;
}
</style>

</head>
<body>

<h1 id="tituloJornada">
    <img src="Logo.png" class="logoTitulo">
    QUINIELAS CANCÚN
</h1>

<div class="resumen">

<div class="tarjetas">

<div class="tarjeta">
<h3>Quinielas</h3>
<span id="totalQuinielas">0</span>
</div>

<div class="tarjeta">
<h3>Dobles</h3>
<span id="totalDobles">0</span>
</div>

<div class="tarjeta">
<h3>Triples</h3>
<span id="totalTriples">0</span>
</div>

<div class="tarjeta">
<h3>Total</h3>
<span id="totalPago">$0</span>
</div>

</div>

</div>

 <div class="listaPartidos" id="listaPartidos"></div>
<div id="listaQuinielas">
 <h2>Mis Quinielas</h2>
<div id="quinielasGuardadas">

<p style="color:#777;text-align:center;">
Aún no has agregado ninguna quiniela.
</p>

</div>

</div>

<div class="acciones">

<button id="agregar">
➕ Agregar Quiniela
</button>


<button id="enviar">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
width="22"
style="vertical-align:middle;margin-right:8px;">
Enviar por WhatsApp
</button>

</div>

<script type="module">
   import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1gDhB37nA5F-zk6-M0hAvZJTGvW6SOBQ",
  authDomain: "quinielas-cancun.firebaseapp.com",
  projectId: "quinielas-cancun",
  storageBucket: "quinielas-cancun.firebasestorage.app",
  messagingSenderId: "419348494986",
  appId: "1:419348494986:web:b73e42c52c3f41e19b8b73"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app); 
const escudos = {
  "América": "america.png.webp",
  "Atlante": "atlante.png.png",
  "Atlas": "atlas.png.jpeg",
  "Chivas": "chivas.png.jpeg",
  "Cruz Azul": "cruz azul.png.jpeg",
  "FC Juárez": "juarez.png.png",
  "León": "leon.png.jpeg",
  "Monterrey": "monterrey.png.jpeg",
  "Necaxa": "necaxa.png.png",
  "Pachuca": "pachuca.png.jpeg",
  "Puebla": "puebla.png.jpeg",
  "Pumas": "pumas.png.jpeg",
  "Querétaro": "queretaro.png.jpeg",
  "Atlético San Luis": "san luis.png.png",
  "Santos": "santos.png.jpeg",
  "Tigres": "tigres.png.jpeg",
  "Tijuana": "tijuana.png.jpeg",
  "Toluca": "toluca.png.png",
  "Sporting Kansas City":"sporting .jpeg",
"Los Ángeles":"los angeles .jpeg",
"Chicago Fire":"chicagofire.png",
 "New York City":"newyork .jpeg"
};
let jornada = [];
let suplente = [];
let numeroJornada = 1;
let telefono = "";
   fetch("/datos/jornada.json")
.then(res => res.json())
.then(data => {

   jornada = data.partidos;
suplente = data.suplente;
COSTO = data.costo;
    numeroJornada = data.jornada;
telefono = data.telefono;
    const titulo = document.getElementById("tituloJornada");
    if (titulo) {
        titulo.innerHTML = `
            <img src="Logo.png" class="logoTitulo">
            QUINIELAS CANCÚN 
        `;
    }

    cargarJornada();

});
let COSTO = 20;

let quinielas=[];
    async function guardarEnFirebase(){

  const nombre = localStorage.getItem("nombre") || "Sin nombre";

  await addDoc(collection(db,"quinielas"),{

    nombre: nombre,
    fecha: serverTimestamp(),
    jornada: numeroJornada,
    quinielas: quinielas,
    totalQuinielas: Number(document.getElementById("totalQuinielas").textContent),
    totalPago: document.getElementById("totalPago").textContent,
estado:"Pendiente"
  });

}

function activarBotones(){

const botones=document.querySelectorAll(".opcion");

botones.forEach(boton=>{

boton.addEventListener("click",()=>{

if(boton.dataset.partido=="10"){

document.querySelectorAll('.opcion[data-partido="10"]').forEach(op=>{

op.classList.remove("activa");

});

boton.classList.add("activa");

}else{

boton.classList.toggle("activa");

}

});

});

}
 function cargarJornada(){

const contenedor=document.getElementById("listaPartidos");

contenedor.innerHTML="";

jornada.forEach((partido,index)=>{

const local=partido[0];
const visitante=partido[1];

contenedor.innerHTML+=`
<div class="partido">

<div class="numero">Partido ${index+1}</div>

<div class="fila">

<div class="local">
<img src="${escudos[local]}" class="escudoMini">
<span>${local}</span>
</div>

<div class="botones">
<div class="opcion" data-partido="${index+1}" data-opcion="L">L</div>
<div class="opcion" data-partido="${index+1}" data-opcion="E">E</div>
<div class="opcion" data-partido="${index+1}" data-opcion="V">V</div>
</div>

<div class="visitante">
<img src="${escudos[visitante]}" class="escudoMini">
<span>${visitante}</span>
</div>

</div>

</div>
`;

});
if(suplente && suplente.length===2){

contenedor.innerHTML+=`

<div class="partido">

<div class="numero" style="font-size:16px;color:#003366;font-weight:bold;">
⭐ PARTIDO SUPLENTE ⭐
</div>

<div style="text-align:center;font-size:12px;color:#666;margin-bottom:10px;">
Este partido contará únicamente si alguno de los anteriores es suspendido.
</div>

<div class="fila">

<div class="local">
<img src="${escudos[suplente[0]]}" class="escudoMini">
<span>${suplente[0]}</span>
</div>

<div class="botones">
<div class="opcion" data-partido="10" data-opcion="L">L</div>
<div class="opcion" data-partido="10" data-opcion="E">E</div>
<div class="opcion" data-partido="10" data-opcion="V">V</div>
</div>

<div class="visitante">
<img src="${escudos[suplente[1]]}" class="escudoMini">
<span>${suplente[1]}</span>
</div>

</div>

</div>

`;

}
activarBotones();

}

function obtenerSeleccion(partido){

const seleccionadas=document.querySelectorAll(
'.opcion.activa[data-partido="'+partido+'"]'
);

let texto="";

seleccionadas.forEach(op=>{

texto+=op.dataset.opcion;

});

return texto;

}

function calcularQuiniela(){

let valor=1;
let dobles=0;
let triples=0;

for(let i=1;i<=9;i++){

const seleccion=obtenerSeleccion(i);

if(seleccion.length==2){

valor*=2;
dobles++;

}

if(seleccion.length==3){

valor*=3;
triples++;

}

}

return{

valor:valor,
dobles:dobles,
triples:triples

};

}
 function actualizarResumen(){

let totalQuinielas = 0;
let totalDobles = 0;
let totalTriples = 0;
let totalPago = 0;

quinielas.forEach(q=>{

    totalQuinielas += q.valor;
    totalDobles += q.dobles;
    totalTriples += q.triples;

    // Cada quiniela paga según sus propias combinaciones
    totalPago += q.valor * COSTO;

});

document.getElementById("totalQuinielas").textContent = totalQuinielas;
document.getElementById("totalDobles").textContent = totalDobles;
document.getElementById("totalTriples").textContent = totalTriples;
document.getElementById("totalPago").textContent = "$" + totalPago;

} 
function limpiarSeleccion(){

document.querySelectorAll(".opcion.activa").forEach(op=>{

op.classList.remove("activa");

});

}
 
  document.getElementById("agregar").addEventListener("click",()=>{

let jugadas=[];

for(let i=1;i<=10;i++){

const seleccion=obtenerSeleccion(i);

if(seleccion==""){

alert("Debes seleccionar al menos una opción en el partido "+i);

return;

}

jugadas.push(seleccion.split(""));

}

const datos = calcularQuiniela();

function generar(indice, actual){

    if(indice===jugadas.length){

        quinielas.push({
            jugadas:[...actual],
            valor:1,
            dobles:0,
            triples:0
        });

        return;
    }

    const opciones = jugadas[indice];

    for(const letra of opciones){

        actual.push(letra);

        generar(indice+1, actual);

        actual.pop();

    }

}

const inicio = quinielas.length;

generar(0, []);

for(let i=inicio;i<quinielas.length;i++){

    quinielas[i].valor = datos.valor;
    quinielas[i].dobles = datos.dobles;
    quinielas[i].triples = datos.triples;

}

const lista=document.getElementById("quinielasGuardadas");

if(quinielas.length==1){

lista.innerHTML="";

}

mostrarQuinielas();

limpiarSeleccion();

});
  function mostrarQuinielas(){

const lista=document.getElementById("quinielasGuardadas");

lista.innerHTML="";

if(quinielas.length===0){

lista.innerHTML="<p style='color:#777;text-align:center;'>Aún no has agregado ninguna quiniela.</p>";

actualizarResumen();

return;

}

quinielas.forEach((q,indice)=>{

const div=document.createElement("div");

div.className="item";

div.innerHTML =
"<b>Quiniela " + (indice+1) + "</b><br>" +
q.jugadas.join(" - ") + "<br><br>" +
"Combinaciones: <b>" + q.valor + "</b><br>" +
"Dobles: <b>" + q.dobles + "</b><br>" +
"Triples: <b>" + q.triples + "</b><br>" +
"Total a pagar: <b>$" + (q.valor * COSTO) + "</b>" +
"<br><br><button onclick='eliminarQuiniela(" + indice + ")'>🗑 Eliminar</button>";
lista.appendChild(div);

});

actualizarResumen();

}

window.eliminarQuiniela = function(indice){

    if(!confirm("¿Deseas eliminar esta quiniela?")){
        return;
    }

    quinielas.splice(indice,1);

    mostrarQuinielas();

}
    document.getElementById("enviar").addEventListener("click", async ()=>{ 

if(quinielas.length===0){

alert("Primero agrega al menos una quiniela.");

return;

}

let mensaje="🏆⚽️ QUINIELAS CANCUN ⚽️🏆\n\n";

mensaje+="Participante: "+(localStorage.getItem("nombre")||"Sin nombre")+"\n\n";

quinielas.forEach((q,i)=>{

mensaje+="QUINIELA "+(i+1)+"\n";
for(let j=0;j<9;j++){

mensaje+="P"+(j+1)+": "+q.jugadas[j]+"\n";

}

mensaje+="PS: "+q.jugadas[9]+"\n";

mensaje+="Valor: "+q.valor+"\n\n";

});

mensaje+="Total de quinielas: "+document.getElementById("totalQuinielas").textContent+"\n";

mensaje+="Total a pagar: "+document.getElementById("totalPago").textContent;
if(confirm("¿Esta seguro que desea enviar las quinielas por WhatsApp?")){

try{
console.log(quinielas);
alert(JSON.stringify(quinielas));
    await guardarEnFirebase();

    

    window.location.href =
"https://wa.me/"+telefono+"?text="+encodeURIComponent(mensaje);

}catch(error){

    

}

}

});
  </script>

</body>

</html>
