<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.45, maximum-scale=5.0">
<title>Administrador - Quinielas Cancún</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#003366;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#003366;
color:white;
}

tr:nth-child(even){
background:#f7f7f7;
}
</style>

</head>

<body>

<script>

const clave = prompt("Contraseña de administrador");

if(clave !== "Cesar1811"){

document.body.innerHTML="<h2 style='text-align:center;margin-top:50px'>Acceso denegado</h2>";

alert("Acceso denegado");
window.location.href = "index.html";

}

</script>
<h1>📋 Administración de Quinielas</h1>

<table>

<thead>
<tr>
<th>Nombre</th>
<th>Jornada</th>
<th>Quinielas</th>
<th>Total</th>
<th>Estado</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="datos">
<tr>
<td colspan="6">Cargando...</td>
</tr>
</tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
updateDoc,
doc,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
const firebaseConfig = {

apiKey:"AIzaSyB1gDhB37nA5F-zk6-M0hAvZJTGvW6SOBQ",
authDomain:"quinielas-cancun.firebaseapp.com",
projectId:"quinielas-cancun",
storageBucket:"quinielas-cancun.firebasestorage.app",
messagingSenderId:"419348494986",
appId:"1:419348494986:web:b73e42c52c3f41e19b8b73"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tabla = document.getElementById("datos");

tabla.innerHTML = "";

const q = query(collection(db,"quinielas"),orderBy("fecha","desc"));

const snapshot = await getDocs(q);

snapshot.forEach(doc=>{

const d = doc.data();
  const id = doc.id;

tabla.innerHTML += `
<tr>
<td>${d.nombre}</td>
<td>${d.jornada}</td>
<td>${d.totalQuinielas}</td>
<td>${d.totalPago}</td>
<td id="estado-${id}">
${
d.estado=="Pagó"
?"🟢 Pagó"
:d.estado=="Cancelado"
?"🔴 Cancelado"
:"🟡 Pendiente"
}
</td>
<td>${d.fecha ? new Date(d.fecha.seconds*1000).toLocaleString() : ""}</td>
<td>
<button onclick="verQuiniela('${id}')">👁️</button>
<button
id="btn-${id}"
onclick="cambiarEstado('${id}')"
style="
background:${
d.estado=="Pagó"
? "#28a745"
: "#ffc107"
};
color:${
d.estado=="Pagó"
? "white"
: "black"
};
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
">
${
d.estado=="Pagó"
? "Pagado"
: "Pendiente"
}
</button>
</td>
</tr>
`;
});
window.verQuiniela = async function(id){

const documento = await getDoc(doc(db,"quinielas",id));

const d = documento.data();

let mensaje = "👤 " + d.nombre + "\n\n";

d.quinielas.forEach((q,i)=>{

mensaje += "QUINIELA " + (i+1) + "\n";

for(let j=0;j<9;j++){

mensaje += "P" + (j+1) + ": " + q.jugadas[j] + "\n";

}

mensaje += "PS: " + q.jugadas[9] + "\n";
mensaje += "Valor: " + q.valor + "\n\n";

});

document.getElementById("contenidoModal").innerText = mensaje;
document.getElementById("modal").style.display = "block";

}
window.cambiarEstado = async function(id){

const documento = await getDoc(doc(db,"quinielas",id));
const d = documento.data();

const nuevoEstado =
d.estado=="Pagó"
? "Pendiente"
: "Pagó";

await updateDoc(doc(db,"quinielas",id),{
estado:nuevoEstado
});

// Cambiar el botón y el texto sin recargar
const boton = document.getElementById("btn-"+id);
const estado = document.getElementById("estado-"+id);

if(nuevoEstado=="Pagó"){
    boton.style.background="#28a745";
    boton.style.color="white";
    boton.innerHTML="Pagado";

    estado.innerHTML="🟢 Pagó";
}else{
    boton.style.background="#ffc107";
    boton.style.color="black";
    boton.innerHTML="Pendiente";

    estado.innerHTML="🟡 Pendiente";
}

}
</script>
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;">

<div style="background:white;width:90%;max-width:500px;margin:40px auto;padding:20px;border-radius:15px;max-height:80%;overflow:auto;">

<h2>Detalle de la Quiniela</h2>

<div id="contenidoModal"></div>

<br>

<button onclick="document.getElementById('modal').style.display='none'">
Cerrar
</button>

</div>

</div>
</body>
</html>
