<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista de Quinielas</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:url("estadio.jpg") center center fixed;
background-size:cover;
}

.contenedor{
width:98%;
max-width:1700px;
margin:20px auto;
background:rgba(255,255,255,.95);
border-radius:15px;
padding:20px;
box-sizing:border-box;
}

.logo{
display:block;
margin:auto;
width:130px;
}

h1{
text-align:center;
color:#4B0082;
margin:10px 0 0;
}

h2{
text-align:center;
margin:5px 0;
color:#333;
}

#mensaje{
text-align:center;
font-weight:bold;
color:#d32f2f;
margin:15px 0;
}

#buscar{
display:block;
margin:15px auto;
padding:10px;
width:320px;
font-size:16px;
border-radius:8px;
border:1px solid #999;
}
#tablaQuiniela{
width:100%;
border-collapse:collapse;
margin-top:25px;
background:white;
}

#tablaQuiniela th,
#tablaQuiniela td{
border:1px solid #222;
text-align:center;
padding:6px;
}

.logoCol{
width:220px;
background:white;
}

.partido{
writing-mode:vertical-rl;
transform:rotate(180deg);
height:220px;
width:45px;
font-size:18px;
font-weight:bold;
background:white;
}

.amarillo{
background:#ffe600;
font-size:28px;
font-weight:bold;
}

#listaParticipantes td{
height:35px;
}
</style>

</head>

<body>

<div class="contenedor">

<img src="logo.png" class="logo">

<h1>QUINIELAS CANCÚN</h1>

<h2 id="estadoLista">
LISTA PRELIMINAR
</h2>

<div id="mensaje">
Quedan 2 horas para realizar modificaciones
</div>

<input
id="buscar"
type="text"
placeholder="🔍 Buscar participante">
<table id="tablaQuiniela">

<thead>

<tr>

<th class="logoCol">

<img
src="logo.png"
style="width:140px;display:block;margin:auto;">

<br>

<div style="
background:#ffe600;
font-size:28px;
font-weight:bold;
padding:8px;
">
RESULTADOS
</div>

<div style="
background:#0d1b5e;
color:white;
font-size:22px;
font-weight:bold;
padding:8px;
">
PARTICIPANTES
</div>

</th>

<th class="partido">Partido 1</th>
<th class="partido">Partido 2</th>
<th class="partido">Partido 3</th>
<th class="partido">Partido 4</th>
<th class="partido">Partido 5</th>
<th class="partido">Partido 6</th>
<th class="partido">Partido 7</th>
<th class="partido">Partido 8</th>
<th class="partido">Partido 9</th>
<th class="partido">PS</th>

</tr>

<tr>

<th class="amarillo">
RESULTADOS
</th>

<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>-</td>

</tr>

</thead>

<tbody id="listaParticipantes">

</tbody>

</table>
</div>

</body>

</html>
