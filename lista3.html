<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista de Quinielas</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#144C88;
}
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:linear-gradient(
180deg,
#d8f0ff 0%,
#78bdf8 8%,
#2f7ecb 20%,
#0d4d95 40%,
#08376b 50%,
#0d4d95 62%,
#5aa8ee 82%,
#d8f0ff 100%
);
}
}

.contenedor{
width:100%;
max-width:none;
margin:0;
background:transparent;
border-radius:0;
padding:20px;
box-sizing:border-box;
}

.logo{
display:block;
margin:0 auto 10px;
width:130px;
}

.encabezado{
text-align:center;
margin-bottom:20px;
}

h1{
margin:0;
text-align:center;
font-size:42px;
font-weight:900;
color:#FFD700;
text-shadow:3px 3px 8px rgba(0,0,0,.6);
}

h2{
text-align:center;
margin:6px 0;
font-size:26px;
font-weight:900;
color:#ffffff;
text-shadow:
2px 2px 6px rgba(0,0,0,.7),
0 0 8px rgba(255,255,255,.3);
letter-spacing:2px;
}

#buscar{
display:block;
margin:15px auto;
padding:14px 18px;
width:340px;
font-size:18px;
font-weight:bold;
border-radius:14px;
border:2px solid #8fc8ff;
outline:none;
color:white;

background:linear-gradient(
180deg,
#d7ecff 0%,
#5ea9ff 12%,
#1d73d6 30%,
#0b4ea8 50%,
#1d73d6 70%,
#6fb6ff 88%,
#0a3d87 100%
);

box-shadow:
0 4px 12px rgba(0,0,0,.35),
inset 0 1px 2px rgba(255,255,255,.8),
inset 0 -2px 3px rgba(0,0,0,.25);
}

#buscar::placeholder{
color:#eef7ff;
opacity:1;
}

#tablaQuiniela{
width:max-content;
min-width:100%;
border-collapse:collapse;
margin-top:25px;
background:white;
}

#tablaQuiniela th,
#tablaQuiniela td{
border:1px solid #222;
text-align:center;
padding:1px;
font-size:10px;
background:white;
}
#tablaQuiniela th{
    background:linear-gradient(
        180deg,
        #fff9cf 0%,
        #ffe98a 12%,
        #ffd43b 28%,
        #c89b00 48%,
        #ffd43b 68%,
        #fff1a8 88%,
        #b8860b 100%
    );
    color:#000;
    text-shadow:1px 1px 1px rgba(255,255,255,.5);
}   


#tablaQuiniela th.ps{
    background:linear-gradient(
        180deg,
        #fff0d6 0%,
        #ffc266 12%,
        #ff9f1a 28%,
        #ff7a00 45%,
        #ffb347 60%,
        #ff8c00 78%,
        #c85a00 100%
    ) !important;
    color:white;
    font-weight:bold;
    text-shadow:1px 1px 2px rgba(0,0,0,.4);
}
.logoCol{
width:75px;
background:white;
}
    
.partido{
writing-mode:vertical-rl;
transform:rotate(180deg);
height:120px;
width:20px;
font-size:7px;
font-weight:bold;
line-height:1;
padding:2px;
background:white;
white-space:normal;
overflow-wrap:break-word;
}

.partido.suplente{
    background:linear-gradient(
        180deg,
        #fff0d6 0%,
        #ffc266 12%,
        #ff9f1a 28%,
        #ff7a00 45%,
        #ffb347 60%,
        #ff8c00 78%,
        #c85a00 100%
    ) !important;
    color:white;
    text-shadow:1px 1px 2px rgba(0,0,0,.4);
}

.amarillo{
background:linear-gradient(
    180deg,
    #fff9cf 0%,
    #ffe98a 12%,
    #ffd43b 28%,
    #c89b00 48%,
    #ffd43b 68%,
    #fff1a8 88%,
    #b8860b 100%
);
color:#000;
font-size:28px;
font-weight:bold;
text-shadow:1px 1px 1px rgba(255,255,255,.5);
}
.participanteTitulo{
background:linear-gradient(
    180deg,
    #d7ecff 0%,
    #5ea9ff 12%,
    #1d73d6 30%,
    #0b4ea8 50%,
    #1d73d6 70%,
    #6fb6ff 88%,
    #0a3d87 100%
) !important;

color:#fff !important;
font-weight:900;
font-size:22px;
text-shadow:2px 2px 4px rgba(0,0,0,.6);
}
 .casilla{
background:#ffffff !important;
color:#000 !important;
font-size:20px;
font-weight:900;
text-shadow:none;
border:1px solid #c0c0c0;
}   
 #listaParticipantes td:first-child{
background:#000 !important;
color:#fff !important;
font-weight:900;
text-shadow:none;
border-right:2px solid #444;
}   
#listaParticipantes td{
height:35px;
}
    .resaltado td{
background:#ffff66 !important;
color:#000 !important;
transition:background .3s;
}
</style>

</head>

<body>

<div class="contenedor">

<div class="encabezado">

    <img src="Logo.png" class="logo">

   

    <h2 id="estadoLista">
        LISTA PRELIMINAR
    </h2>

    

</div>

<input
id="buscar"
type="text"
placeholder="🔍 Buscar participante">
    <div style="overflow-x:auto; width:100%;">
<table id="tablaQuiniela">

<thead>

<tr>
    <th rowspan="2" class="participanteTitulo">Participante</th>
    <th>P1</th>
    <th>P2</th>
    <th>P3</th>
    <th>P4</th>
    <th>P5</th>
    <th>P6</th>
    <th>P7</th>
    <th>P8</th>
    <th>P9</th>
    <th class="ps">PS</th>
</tr>

<tr>
 

    <th class="partido"></th>
    <th class="partido"></th>
    <th class="partido"></th>
    <th class="partido"></th>
    <th class="partido"></th>
    <th class="partido"></th>
    <th class="partido"></th>
    <th class="partido"></th>
    <th class="partido"></th>
<th id="partidoSuplente" class="partido suplente"></th>
    
</tr>

</thead>

<tbody id="listaParticipantes">

</tbody>

</table>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1gDhB37nA5F-zk6-M0hAvZJTGvW6SOBQ",
  authDomain: "quinielas-cancun.firebaseapp.com",
  projectId: "quinielas-cancun",
  storageBucket: "quinielas-cancun.firebasestorage.app",
  messagingSenderId: "419348494986",
  appId: "1:419348494986:web:b73e42c52c3f41e19b8b73"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tbody = document.getElementById("listaParticipantes");
 let partidos = [];
let suplente = [];

fetch("/datos/jornada.json")
    .then(r => r.json())
   .then(data => {

    partidos = data.partidos;
    suplente = data.suplente;

    actualizarEncabezados();

    cargarLista();

});
function actualizarEncabezados(){

    const encabezados = document.querySelectorAll(".partido");

    partidos.forEach((p,i)=>{

        if(encabezados[i]){

        encabezados[i].textContent =
    p[0] + " vs " + p[1];    

        }

    });
const ps = document.getElementById("partidoSuplente");

if (ps && suplente.length === 2) {

    ps.textContent = suplente[0] + " vs " + suplente[1];

}
}   
function expandirQuiniela(jugadas){

    let resultado=[[]];

    jugadas.forEach(jugada=>{

        const opciones=jugada.split("");

        let nuevas=[];

        resultado.forEach(base=>{

            opciones.forEach(op=>{

                nuevas.push([...base,op]);

            });

        });

        resultado=nuevas;

    });

    return resultado;

}
async function cargarLista() {

    tbody.innerHTML = "";

    let numero = 1;

    const q = query(
        collection(db, "quinielas"),
        orderBy("fecha", "asc")
    );

    const snapshot = await getDocs(q);

    snapshot.forEach(doc => {

    
});
    snapshot.forEach(doc => {
        const datos = doc.data();

        const nombre = datos.nombre || "";

        const quinielas = datos.quinielas || [];

  quinielas.forEach((quiniela) => {

    const combinaciones = expandirQuiniela(quiniela.jugadas);

    combinaciones.forEach(jugada => {

        const fila = document.createElement("tr");

       fila.innerHTML = `
<td><strong>${numero}</strong> ${nombre}</td>
${jugada.map(v=>`<td class="casilla">${v}</td>`).join("")}
`;

        tbody.appendChild(fila);

        numero++;

    });

});

     });

}

cargarLista();   
const buscar = document.getElementById("buscar");

buscar.addEventListener("input", () => {

    const texto = buscar.value.trim().toLowerCase();

    document.querySelectorAll("#listaParticipantes tr").forEach(fila=>{
        fila.classList.remove("resaltado");
    });

    if(texto===""){
        return;
    }

    const filas = tbody.querySelectorAll("tr");

    for(const fila of filas){

        const nombre = fila.cells[0].textContent.toLowerCase();

        if(nombre.includes(texto)){

            fila.classList.add("resaltado");

            fila.scrollIntoView({
                behavior:"smooth",
                block:"center"
            });

            break;
        }
    }

});
</script>

</body>
</html>
