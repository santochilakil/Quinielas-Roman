<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista de Quinielas</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:url("A71A3DF2-DE11-4C4E-9A40-F84BF17D8ED2.png") no-repeat center center fixed;
background-size:cover;
}

.contenedor{
width:100%;
max-width:none;
margin:0;
background:rgba(255,255,255,.95);
border-radius:0;
padding:20px;
box-sizing:border-box;
}

.logo{
display:block;
margin:0 auto 10px;
width:130px;
}

.encabezado{
text-align:center;
margin-bottom:20px;
}

h1{
margin:0;
text-align:center;
font-size:42px;
font-weight:900;
color:#FFD700;
text-shadow:3px 3px 8px rgba(0,0,0,.6);
}

h2{
text-align:center;
margin:6px 0;
font-size:26px;
font-weight:bold;
color:#0d1b5e;
}


#buscar{
display:block;
margin:15px auto;
padding:10px;
width:320px;
font-size:16px;
border-radius:8px;
border:1px solid #999;
}
#tablaQuiniela{
width:100%;
border-collapse:collapse;
margin-top:25px;
background:white;
}

#tablaQuiniela th,
#tablaQuiniela td{
border:1px solid #222;
text-align:center;
padding:6px;
}

.logoCol{
width:220px;
background:white;
}

.partido{
writing-mode:vertical-rl;
transform:rotate(180deg);
height:220px;
width:45px;
font-size:18px;
font-weight:bold;
background:white;
}

.amarillo{
background:#ffe600;
font-size:28px;
font-weight:bold;
}

#listaParticipantes td{
height:35px;
}
</style>

</head>

<body>

<div class="contenedor">

<div class="encabezado">

    <img src="Logo.png" class="logo">

    <h1>QUINIELAS CANCÚN</h1>

    <h2 id="estadoLista">
        LISTA PRELIMINAR
    </h2>

    

</div>

<input
id="buscar"
type="text"
placeholder="🔍 Buscar participante">
<table id="tablaQuiniela">

<thead>

<tr>

<th class="logoCol">

<img
src="Logo.png"
style="width:140px;display:block;margin:10px auto;">

<div style="
background:#ffe600;
font-size:28px;
font-weight:bold;
padding:8px;
border:1px solid #222;
">
RESULTADOS
</div>

<div id="filaResultados"
style="
display:grid;
grid-template-columns:repeat(10,1fr);
background:white;
border-left:1px solid #222;
border-right:1px solid #222;
border-bottom:1px solid #222;
">

<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>

</div>

<div style="
background:#0d1b5e;
color:white;
font-size:22px;
font-weight:bold;
padding:8px;
margin-top:5px;
">
PARTICIPANTES
</div>

</th>

<th class="partido">Partido 1</th>
<th class="partido">Partido 2</th>
<th class="partido">Partido 3</th>
<th class="partido">Partido 4</th>
<th class="partido">Partido 5</th>
<th class="partido">Partido 6</th>
<th class="partido">Partido 7</th>
<th class="partido">Partido 8</th>
<th class="partido">Partido 9</th>
<th class="partido" id="partidoSuplente">PS</th>

</tr>



</thead>

<tbody id="listaParticipantes">

</tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1gDhB37nA5F-zk6-M0hAvZJTGvW6SOBQ",
  authDomain: "quinielas-cancun.firebaseapp.com",
  projectId: "quinielas-cancun",
  storageBucket: "quinielas-cancun.firebasestorage.app",
  messagingSenderId: "419348494986",
  appId: "1:419348494986:web:b73e42c52c3f41e19b8b73"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tbody = document.getElementById("listaParticipantes");
 let partidos = [];
let suplente = [];

fetch("/datos/jornada.json")
    .then(r => r.json())
   .then(data => {

    partidos = data.partidos;
    suplente = data.suplente;

    actualizarEncabezados();

    cargarLista();

});
function actualizarEncabezados(){

    const encabezados = document.querySelectorAll(".partido");

    partidos.forEach((p,i)=>{

        if(encabezados[i]){

        encabezados[i].textContent =
    p[0] + " vs " + p[1];    

        }

    });
const ps = document.getElementById("partidoSuplente");

if (ps && suplente.length === 2) {

    ps.textContent = suplente[0] + " vs " + suplente[1];

}
}   
function expandirQuiniela(jugadas){

    let resultado=[[]];

    jugadas.forEach(jugada=>{

        const opciones=jugada.split("");

        let nuevas=[];

        resultado.forEach(base=>{

            opciones.forEach(op=>{

                nuevas.push([...base,op]);

            });

        });

        resultado=nuevas;

    });

    return resultado;

}
async function cargarLista() {

    tbody.innerHTML = "";

    let numero = 1;

    const q = query(
        collection(db, "quinielas"),
        orderBy("fecha", "asc")
    );

    const snapshot = await getDocs(q);

    snapshot.forEach(doc => {

        const datos = doc.data();

        const nombre = datos.nombre || "";

        const quinielas = datos.quinielas || [];

  quinielas.forEach((quiniela) => {

    const combinaciones = expandirQuiniela(quiniela.jugadas);

    combinaciones.forEach(jugada => {

        const fila = document.createElement("tr");

        fila.innerHTML = `
            <td><strong>${numero}</strong><br>${nombre}</td>
            <td>${jugada[0]}</td>
            <td>${jugada[1]}</td>
            <td>${jugada[2]}</td>
            <td>${jugada[3]}</td>
            <td>${jugada[4]}</td>
            <td>${jugada[5]}</td>
            <td>${jugada[6]}</td>
            <td>${jugada[7]}</td>
            <td>${jugada[8]}</td>
            <td>${jugada[9]}</td>
        `;

        tbody.appendChild(fila);

        numero++;

    });

});

     });

}

cargarLista();   

</script>

</body>
</html>
