<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulario - Quinielas Cancún</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
 .logo{
    width:180px;
    height:auto;
    display:block;
    margin:20px auto;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:url("A71A3DF2-DE11-4C4E-9A40-F84BF17D8ED2.png") center center/cover no-repeat;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
min-height:100vh;
padding-top:20px;
}

.contenedor{
background:rgba(0,0,0,.35);
backdrop-filter:blur(8px);
padding:40px;
border-radius:20px;
width:90%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
text-align:center;
margin-top:120px;
}

h1{
    color:#fff;
    font-size:52px;
    font-weight:900;
    text-align:center;
    margin:15px 0 35px;
    text-shadow:3px 3px 10px rgba(0,0,0,.8);
}
input{
width:100%;
padding:15px;
font-size:18px;
border-radius:10px;
border:2px solid #ccc;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
font-size:20px;
font-weight:bold;
background:#FFD700;
border:none;
border-radius:40px;
cursor:pointer;
}

button:hover{
background:#FFC107;
}
 .logo{
width:180px;
height:auto;
display:block;
margin-bottom:25px;
}

</style>

</head>

<body>

<img src="Logo.png" class="logo" alt="Quinielas Cancún">
<h1>Comienza tu Quiniela</h1>
 <h1>SUERTE</h1>
<div class="contenedor">
<input
type="text"
placeholder="Escribe tu nombre completo"
id="nombre">

<button onclick="continuar()">
Continuar
</button>

</div>

<script>

function continuar(){

let nombre=document.getElementById("nombre").value;

if(nombre==""){

alert("Por favor escribe tu nombre.");

return;

}
localStorage.setItem("nombre", nombre);
window.location.href = "Partidos.html";

}

</script>

</body>

</html>
